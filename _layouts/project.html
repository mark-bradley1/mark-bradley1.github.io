---
layout: default
---
<article class="card">
  <h1>{{ page.title }}</h1>

  <p><strong>Tech:</strong> {{ page.stack | join: ", " }}</p>

  <div>
    {{ content }}
  </div>

  {% if page.github %}
  <p><a href="{{ page.github }}">View on GitHub →</a></p>
  {% endif %}
    {% if page.demo %}
  <p>
    <a href="{{ page.demo }}" target="_blank" rel="noopener noreferrer">
      View Live Site →
    </a>
  </p>
  {% endif %}
</article>
